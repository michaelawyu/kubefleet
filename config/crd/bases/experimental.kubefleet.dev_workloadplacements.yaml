---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: workloadplacements.experimental.kubefleet.dev
spec:
  group: experimental.kubefleet.dev
  names:
    categories:
    - kubefleet
    - kubefleet-experimental
    kind: WorkloadPlacement
    listKind: WorkloadPlacementList
    plural: workloadplacements
    shortNames:
    - wkp
    singular: workloadplacement
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          WorkloadPlacement is a KubeFleet API that allows users to place workloads across
          member clusters.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: The specification of the workload placement.
            properties:
              additionalResourceRefs:
                description: |-
                  A list of object references that point to the additional resources that are depended upon
                  by the workload object.

                  KubeFleet can auto-discover such resources by checking at the pod template from the workload
                  object. There is no need to explicitly list them there. KubeFleet will also create the
                  namespace needed for this application automatically.

                  The auto-discovery is not supported at the moment.
                items:
                  description: |-
                    SameNamespacedObjectReference is a reference to an object in the same namespace as
                    the referencing object.
                  properties:
                    apiGroup:
                      type: string
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      description: The name of the referenced object.
                      type: string
                    resource:
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  - resource
                  type: object
                type: array
              capacityRequest:
                description: |-
                  The capacity request for each pod of this workload. KubeFleet uses this information to help
                  find the most appropriate member cluster(s) for placing the workload, taking information
                  such as node availability into consideration.

                  The information is not currently in use by KubeFleet.
                properties:
                  nodeInstanceRequests:
                    description: |-
                      A list of label matchers that specifies the nodes appropriate for running pods of this
                      application. These selectors are OR'd. If not specified, any node is considered appropriate.

                      For example:
                      * use node.kubernetes.io/instance-type to specify some node types (VM sizes), e.g., Standard_DS3_v2 (on Azure)
                        to ensure that all pods will run on the specified VM types only.
                      * use kubernetes.io/arch to specify the architecture needed, e.g., amd64 or arm64.
                      * use kubernetes.io/os to specify the OS needed, e.g., linux or windows.
                    items:
                      additionalProperties:
                        type: string
                      type: object
                    type: array
                  resourceRequests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      A list of resource requests (CPU, memory, GPU, etc.) for each pod of this application.

                      If not specified, KubeFleet will use the resource requests specified in the pod template
                      here.
                    type: object
                type: object
              clusterSelectors:
                description: |-
                  A list of label matchers that specifies the member clusters where KubeFleet should place
                  the workloads. For **each** label matcher, KubeFleet will find all matching member cluster and
                  pick one of them to place the workload, as appropriate; if none can be found for a specific
                  label matcher, KubeFleet will request a member cluster to be provisioned.

                  If not specified, KubeFleet will pick one member cluster from all member clusters.
                items:
                  additionalProperties:
                    type: string
                  type: object
                maxItems: 5
                minItems: 1
                type: array
              revisionHistoryLimit:
                default: 3
                description: |-
                  The revision history limit for this application. Every change to the application, including
                  changes to the pod template and to the supplementary resources (e.g., ConfigMaps, Secrets)
                  will create a new revision.

                  The default value is 3.

                  This field is not currently in use by KubeFleet.
                format: int32
                maximum: 20
                minimum: 1
                type: integer
              workloadRef:
                description: |-
                  An object reference that points to the workload that KubeFleet will place.

                  Currently, only Deployment is supported.
                properties:
                  apiGroup:
                    type: string
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    description: The name of the referenced object.
                    type: string
                  resource:
                    type: string
                required:
                - apiVersion
                - kind
                - name
                - resource
                type: object
            required:
            - workloadRef
            type: object
          status:
            description: The observed status of the workload placement.
            properties:
              bindingManagers:
                description: A list of binding managers that are currently managing
                  the bindings for this placement.
                items:
                  properties:
                    controllerName:
                      description: |-
                        A name of the controller that manages the bindings for this placement.

                        This field is mutually exclusive with the field, `ObjectRef`. Exactly one of them
                        should be set.
                      type: string
                    mode:
                      default: Exclusive
                      description: |-
                        The mode of this binding manager. See the comments for each mode for more information.

                        The default value is "Exclusive".
                      enum:
                      - Exclusive
                      - SharedAmongSameKindObjects
                      type: string
                    objectRef:
                      description: |-
                        A reference that points to the binding manager object.

                        This field is mutually exclusive with the field, `ControllerName`. Exactly one of them
                        should be set.
                      properties:
                        apiGroup:
                          type: string
                        apiVersion:
                          type: string
                        kind:
                          type: string
                        name:
                          description: The name of the referenced object.
                          type: string
                        resource:
                          type: string
                      required:
                      - apiVersion
                      - kind
                      - name
                      - resource
                      type: object
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of objectRef or controllerName must be set
                    rule: has(self.objectRef) != has(self.controllerName)
                type: array
              conditions:
                description: A list of conditions that describe the workload placement.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              latestResourceSnapshotRevisionName:
                description: The name of the latest revision of the resource snapshot
                  created for this placement.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
